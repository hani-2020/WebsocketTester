name: Build iOS IPA
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build App (Simulator)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -derivedDataPath DerivedData
          
      - name: Prepare for Sauce Labs
        run: |
          # Find the .app and zip it
          APP_PATH=$(find ios/App/DerivedData -name "App.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: App.app not found!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cd $(dirname "$APP_PATH")
          zip -r ../../../../App-Simulator.zip App.app
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-saucelabs-build
          path: App-Simulator.zip
