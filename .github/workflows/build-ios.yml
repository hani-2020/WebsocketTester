name: Build iOS IPA
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build App (Simulator)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -derivedDataPath DerivedData
          
      - name: Prepare for Sauce Labs
        run: |
          # Find the .app folder
          APP_PATH=$(find ios/App/DerivedData -name "App.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::App.app not found in ios/App/DerivedData"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create zip at root of workspace
          # We change into the .app's parent directory first so that the .app folder
          # is at the root of the zip archive, which Sauce Labs requires.
          cd "$(dirname "$APP_PATH")"
          zip -q -r "${{ github.workspace }}/App-Simulator.zip" "$(basename "$APP_PATH")"
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-saucelabs-build
          path: App-Simulator.zip
          retention-days: 1
