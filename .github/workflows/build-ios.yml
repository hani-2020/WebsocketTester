name: Build iOS IPA
on: [push, workflow_dispatch]

env:
  # Opt into Node.js 24 to suppress deprecation warnings and future-proof the runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build IPA (Simulator)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphonesimulator -derivedDataPath Build/
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: ios/App/Build/Build/Products/Debug-iphonesimulator/App.app
